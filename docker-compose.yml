services:
  postgres:
    image: postgres:16
    container_name: talkwdata_postgres
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USERNAME}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      POSTGRES_DB: ${DAGSTER_PG_DB}
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAGSTER_PG_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talkwdata_network

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    container_name: talkwdata_server
    ports:
      - "8000:8000"
    networks:
      - talkwdata_network

